<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Marketplace V2</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0d0d0d;color:white}

nav{
background:#111;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
color:#00d9ff;
position:sticky;top:0;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:15px;
}

.card{
background:#1a1a1a;
padding:10px;
border-radius:10px;
}

img{width:100%;height:180px;object-fit:cover;border-radius:8px}

button{
width:100%;
padding:8px;
margin-top:5px;
border:none;
cursor:pointer;
font-weight:bold;
}

.buy{background:#00d9ff}
.cod{background:#444;color:white}

#cartBox{
position:fixed;
right:0;
top:0;
width:320px;
height:100%;
background:#111;
padding:10px;
overflow:auto;
display:none;
}

.item{
border-bottom:1px solid #333;
padding:5px;
}

.admin{
position:fixed;
bottom:10px;
right:10px;
background:#00d9ff;
border:none;
padding:10px;
cursor:pointer;
}

#adminPanel{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
overflow:auto;
padding:20px;
}
</style>
</head>

<body>

<nav>
<div>🛒 Amazon Marketplace V2</div>
<button onclick="toggleCart()">Cart (<span id="count">0</span>)</button>
</nav>

<div class="container" id="products"></div>

<!-- CART -->
<div id="cartBox">
<h3>Cart</h3>
<div id="cartItems"></div>
<h3>Total: ₹<span id="total"></span></h3>

<button class="buy" onclick="razorpayPay()">Pay Online</button>
<button class="cod" onclick="codOrder()">COD Order</button>
<button onclick="toggleCart()">Close</button>
</div>

<!-- ADMIN -->
<button class="admin" onclick="openAdmin()">Admin</button>

<div id="adminPanel">
<h2>📦 Orders Dashboard</h2>
<button onclick="closeAdmin()">Close</button>
<div id="orders"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
projectId: "YOUR_PROJECT",
storageBucket: "YOUR_BUCKET",
messagingSenderId: "ID",
appId: "ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🛍 50 PRODUCTS (sample set expanded) */
const products = Array.from({length:50}).map((_,i)=>({
name:`Product ${i+1}`,
price: Math.floor(Math.random()*2000)+300,
img:"https://images.unsplash.com/photo-1585386959984-a41552231693"
}));

/* CART */
let cart=[];

const box=document.getElementById("products");

products.forEach((p,i)=>{
box.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<button class="buy" onclick="add(${i})">Add to Cart</button>
</div>`;
});

window.add = function(i){
cart.push(products[i]);
updateCart();
}

function updateCart(){
document.getElementById("count").innerText=cart.length;

let html="",total=0;

cart.forEach((c,i)=>{
html+=`
<div class="item">
<p>${c.name}</p>
<p>₹${c.price}</p>
<button onclick="remove(${i})">Remove</button>
</div>`;
total+=c.price;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
}

window.remove = function(i){
cart.splice(i,1);
updateCart();
}

window.toggleCart = function(){
let c=document.getElementById("cartBox");
c.style.display=c.style.display==="block"?"none":"block";
}

/* 💳 RAZORPAY */
window.razorpayPay = function(){

let total=cart.reduce((a,b)=>a+b.price,0);

var options={
key:"rzp_live_RmVZXEibHJhsBR",
amount:total*100,
currency:"INR",
name:"Amazon V2 Marketplace",

handler: async function(res){

let name=prompt("Name");
let phone=prompt("Phone");
let address=prompt("Address");

/* SAVE ORDER */
await addDoc(collection(db,"orders"),{
cart,
name,
phone,
address,
paymentId:res.razorpay_payment_id,
time:new Date()
});

/* INVOICE */
const { jsPDF } = window.jspdf;
const doc = new jsPDF();

doc.text("AMAZON V2 INVOICE",20,20);
doc.text("Total: ₹"+total,20,40);
doc.text("Payment ID: "+res.razorpay_payment_id,20,50);
doc.save("invoice.pdf");

alert("Payment Success + Order Saved");
cart=[];
updateCart();
}
};

new Razorpay(options).open();
}

/* COD */
window.codOrder = async function(){

let name=prompt("Name");
let phone=prompt("Phone");
let address=prompt("Address");

await addDoc(collection(db,"orders"),{
cart,
name,
phone,
address,
type:"COD",
time:new Date()
});

alert("COD Order Placed");
cart=[];
updateCart();
}

/* ADMIN */
window.openAdmin = async function(){

let pass=prompt("Admin Password");
if(pass!="admin123") return;

document.getElementById("adminPanel").style.display="block";

let snap=await getDocs(collection(db,"orders"));

let html="";

snap.forEach(d=>{
let o=d.data();

html+=`
<div style="border:1px solid #333;margin:10px;padding:10px">
<p><b>${o.name}</b></p>
<p>${o.phone}</p>
<p>${o.address}</p>
<p>${o.paymentId || "COD Order"}</p>
</div>`;
});

document.getElementById("orders").innerHTML=html;
}

window.closeAdmin=function(){
document.getElementById("adminPanel").style.display="none";
}

</script>

</body>
</html>
